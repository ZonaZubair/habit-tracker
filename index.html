<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habitual — Daily Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --paper-mid: #ede8dc;
    --paper-dark: #d9d2c3;
    --accent: #c8492a;
    --accent-light: #f0e0da;
    --accent-mid: #e8896e;
    --green: #2d7a4f;
    --green-light: #d4edde;
    --green-mid: #6abf8a;
    --muted: #8a8278;
    --col-w: 52px;
    --row-h: 56px;
    --label-w: 200px;
    --radius: 4px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }


  header {
    border-bottom: 2px solid var(--ink);
    padding: 0 clamp(16px, 4vw, 48px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    height: 64px;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 100;
  }

  .wordmark {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    display: flex;
    align-items: baseline;
    gap: 2px;
  }

  .wordmark span {
    color: var(--accent);
  }

  .header-meta {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }


  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: clamp(24px, 5vw, 48px) clamp(16px, 4vw, 48px) 80px;
  }


  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .week-label {
    font-family: var(--font-display);
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    flex: 1;
    min-width: 160px;
  }

  .week-label .week-year {
    font-size: 0.5em;
    color: var(--muted);
    font-weight: 400;
    margin-left: 8px;
  }

  .nav-btn {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    border-radius: var(--radius);
    white-space: nowrap;
  }

  .nav-btn:hover { background: var(--ink); color: var(--paper); }
  .nav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .nav-btn.today-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .nav-btn.today-btn:hover { background: #a33820; border-color: #a33820; }
  .nav-btn.today-btn.hidden { display: none; }


  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    align-items: center;
  }

  .add-input {
    font-family: var(--font-body);
    font-size: 0.95rem;
    border: 1.5px solid var(--paper-dark);
    background: white;
    color: var(--ink);
    padding: 10px 14px;
    border-radius: var(--radius);
    flex: 1;
    max-width: 360px;
    transition: border-color 0.15s;
  }

  .add-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .add-input::placeholder { color: var(--muted); }

  .add-btn {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 10px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .add-btn:hover { background: #2a2820; }
  .add-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }


  .grid-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -4px;
    padding: 0 4px 4px;
  }

  /* grid columns */
  .habit-grid {
    min-width: 580px;
    width: 100%;
  }

  /* Column headers */
  .grid-header {
    display: grid;
    grid-template-columns: var(--label-w) repeat(7, var(--col-w)) 72px;
    gap: 0;
    margin-bottom: 2px;
    padding-left: 0;
    align-items: end;
  }

  .day-header {
    text-align: center;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .day-name {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .day-num {
    font-family: var(--font-display);
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .day-header.is-today .day-name { color: var(--accent); }
  .day-header.is-today .day-num {
    color: var(--accent);
    background: var(--accent-light);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
  }

  /* Habit rows */
  .habit-row {
    display: grid;
    grid-template-columns: var(--label-w) repeat(7, var(--col-w)) 72px;
    gap: 0;
    min-height: var(--row-h);
    align-items: center;
    border-top: 1px solid var(--paper-dark);
    position: relative;
    transition: background 0.1s;
  }

  .habit-row:last-child { border-bottom: 1px solid var(--paper-dark); }
  .habit-row:hover { background: rgba(255,255,255,0.5); }

  /* Today column highlight */
  .today-col-highlight {
    position: absolute;
    top: 0; bottom: 0;
    background: var(--accent-light);
    pointer-events: none;
    border-radius: 0;
    opacity: 0.5;
  }

  /* Habit label */
  .habit-label-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 8px 8px 0;
    position: relative;
    z-index: 2;
  }

  .habit-name {
    font-size: 0.88rem;
    font-weight: 500;
    line-height: 1.3;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 3px;
    padding: 2px 4px;
    transition: border-color 0.15s;
  }

  .habit-name:hover { border-color: var(--paper-dark); background: white; }

  .habit-name-input {
    font-family: var(--font-body);
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
    border: 1.5px solid var(--accent);
    border-radius: 3px;
    padding: 2px 6px;
    width: 100%;
    background: white;
    outline: none;
  }

  /* Check cells */
  .check-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    position: relative;
    z-index: 2;
  }

  .check-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--paper-dark);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: visible;
  }

  .check-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .check-btn:hover:not(.disabled) {
    border-color: var(--green-mid);
    transform: scale(1.1);
  }

  .check-btn.checked {
    background: var(--green);
    border-color: var(--green);
    transform: scale(1);
  }

  .check-btn.checked:hover:not(.disabled) {
    background: #235f3d;
    border-color: #235f3d;
    transform: scale(1.05);
  }

  .check-btn.disabled {
    cursor: default;
    opacity: 0.4;
  }

  .check-btn svg {
    width: 16px; height: 16px;
    stroke: white;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .check-btn.checked svg { opacity: 1; }

  /* Pop animation */
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    70% { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  .check-btn.pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Streak cell */
  .streak-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    padding: 0 4px;
  }

  .streak-badge {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 4px 8px;
    border-radius: 20px;
    background: var(--paper-mid);
    white-space: nowrap;
    transition: all 0.2s;
  }

  .streak-badge.active {
    color: var(--green);
    background: var(--green-light);
    font-weight: 600;
  }

  .streak-badge.hot {
    color: var(--accent);
    background: var(--accent-light);
    font-weight: 700;
  }

  .streak-icon { font-size: 0.8rem; }

  /* Delete btn */
  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 3px;
    opacity: 0;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .habit-row:hover .delete-btn,
  .habit-label-cell:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent); background: var(--accent-light); }
  .delete-btn:focus-visible { opacity: 1; outline: 2px solid var(--accent); outline-offset: 2px; }

  /* empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
    border: 2px dashed var(--paper-dark);
    border-radius: 8px;
    gap: 16px;
  }

  .empty-state.hidden { display: none; }

  .empty-icon {
    font-size: 3rem;
    line-height: 1;
    opacity: 0.5;
  }

  .empty-title {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
  }

  .empty-body {
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.6;
  }

  .empty-cta {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    padding: 8px 20px;
    border-radius: var(--radius);
    background: none;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }

  .empty-cta:hover { background: var(--accent); color: white; }
  .empty-cta:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }


  .summary-bar {
    display: flex;
    gap: 24px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--paper-dark);
    flex-wrap: wrap;
  }

  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-val {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 900;
    line-height: 1;
    color: var(--ink);
  }

  .summary-val.accent { color: var(--accent); }
  .summary-val.green { color: var(--green); }

  .summary-label {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }


  @media (max-width: 640px) {
    :root {
      --col-w: 40px;
      --label-w: 140px;
      --row-h: 52px;
    }

    .week-label { font-size: 1.1rem; }

    .day-num { font-size: 0.9rem; }

    .day-header.is-today .day-num {
      width: 28px; height: 28px; font-size: 0.85rem;
    }

    .check-btn { width: 30px; height: 30px; }
    .check-btn svg { width: 14px; height: 14px; }

    .streak-badge { font-size: 0.65rem; padding: 3px 6px; }
    .streak-icon { display: none; }

    .add-input { max-width: 100%; }

    .header-meta { display: none; }
  }

  @media (max-width: 400px) {
    :root {
      --col-w: 36px;
      --label-w: 110px;
    }
  }


  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .habit-row { animation: fadeSlideIn 0.2s ease forwards; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.25s ease; }
</style>
</head>
<body>

<header>
  <div class="wordmark">Habit<span>ual</span></div>
  <div class="header-meta" id="headerDate"></div>
</header>

<main>
  <!-- Week Navigation -->
  <nav class="week-nav" aria-label="Week navigation">
    <div class="week-label" id="weekLabel" aria-live="polite"></div>
    <button class="nav-btn" id="prevWeekBtn" aria-label="Previous week">← Prev</button>
    <button class="nav-btn" id="nextWeekBtn" aria-label="Next week">Next →</button>
    <button class="nav-btn today-btn hidden" id="todayBtn" aria-label="Go to current week">This week</button>
  </nav>

  <!-- Add Habit -->
  <div class="add-row">
    <input
      class="add-input"
      id="habitInput"
      type="text"
      placeholder="Add a habit — e.g. Read 30 min, Exercise…"
      maxlength="60"
      aria-label="New habit name"
    >
    <button class="add-btn" id="addHabitBtn" aria-label="Add habit">+ Add</button>
  </div>

  <!-- Grid Wrapper -->
  <div class="grid-wrapper" role="region" aria-label="Habit tracker grid">
    <!-- Day headers -->
    <div class="grid-header" id="gridHeader" role="row" aria-label="Days of the week"></div>

    <!-- Habit rows -->
    <div id="habitGrid" role="grid" aria-label="Habits"></div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" role="status" aria-label="No habits yet">
    <div class="empty-icon" aria-hidden="true">◎</div>
    <div class="empty-title">No habits yet.</div>
    <p class="empty-body">Start by adding something small — "Read 10 pages," "Drink water," or "10 min walk." Consistency beats intensity.</p>
    <button class="empty-cta" id="emptyCtaBtn">Add your first habit</button>
  </div>

  <!-- Summary Bar -->
  <div class="summary-bar" id="summaryBar" aria-label="Weekly summary"></div>
</main>

<script>
const STORAGE_KEY = 'habitual_v2';
const WEEK_STARTS_MONDAY = true;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { habits: [], checks: {} };
  } catch { return { habits: [], checks: {} }; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

const state = loadData();

// date helpers

function toDateStr(d) {
  // local YYYY-MM-DD, not UTC
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function today() {
  return toDateStr(new Date());
}

function getWeekStart(offsetWeeks = 0) {
  const d = new Date();
  const dow = d.getDay();
  const diff = WEEK_STARTS_MONDAY ? (dow === 0 ? -6 : 1 - dow) : -dow;
  d.setDate(d.getDate() + diff + offsetWeeks * 7);
  d.setHours(0, 0, 0, 0);
  return d;
}

function getWeekDays(weekStart) {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function isFuture(dateStr) {
  return dateStr > today();
}

function getStreak(habitId) {
  const td = today();
  const checks = state.checks[habitId] || {};
  let streak = 0;
  const d = new Date();
  // don't break streak just because today isn't checked yet
  if (!checks[td]) d.setDate(d.getDate() - 1);
  while (true) {
    const ds = toDateStr(d);
    if (!checks[ds]) break;
    streak++;
    d.setDate(d.getDate() - 1);
    if (streak > 3650) break;
  }
  return streak;
}

let currentWeekOffset = 0;

const DAY_NAMES = WEEK_STARTS_MONDAY
  ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
  : ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function render() {
  const weekStart = getWeekStart(currentWeekOffset);
  const days = getWeekDays(weekStart);
  const td = today();

  // Week label
  const firstDay = days[0];
  const lastDay = days[6];
  let label;
  if (firstDay.getMonth() === lastDay.getMonth()) {
    label = `${MONTH_NAMES[firstDay.getMonth()]} ${firstDay.getDate()}–${lastDay.getDate()}`;
  } else {
    label = `${MONTH_NAMES[firstDay.getMonth()]} ${firstDay.getDate()} – ${MONTH_NAMES[lastDay.getMonth()]} ${lastDay.getDate()}`;
  }

  document.getElementById('weekLabel').innerHTML =
    `${label} <span class="week-year">${firstDay.getFullYear()}</span>`;

  const todayBtn = document.getElementById('todayBtn');
  todayBtn.classList.toggle('hidden', currentWeekOffset === 0);

  // header
  const now = new Date();
  document.getElementById('headerDate').textContent =
    `${DAY_NAMES[WEEK_STARTS_MONDAY ? (now.getDay() === 0 ? 6 : now.getDay() - 1) : now.getDay()]}, ${MONTH_NAMES[now.getMonth()]} ${now.getDate()}`;

  // Grid header
  const header = document.getElementById('gridHeader');
  header.innerHTML = '<div></div>'; // label spacer
  days.forEach((d, i) => {
    const ds = toDateStr(d);
    const isToday = ds === td;
    const div = document.createElement('div');
    div.className = 'day-header' + (isToday ? ' is-today' : '');
    div.setAttribute('role', 'columnheader');
    div.setAttribute('aria-label', `${DAY_NAMES[i]}, ${d.getDate()}`);
    div.innerHTML = `
      <span class="day-name">${DAY_NAMES[i]}</span>
      <span class="day-num">${d.getDate()}</span>
    `;
    header.appendChild(div);
  });
  header.innerHTML += '<div></div>'; // streak spacer

  // Today column index
  const todayColIndex = days.findIndex(d => toDateStr(d) === td);

  // Habit rows
  const grid = document.getElementById('habitGrid');
  grid.innerHTML = '';

  const hasHabits = state.habits.length > 0;
  document.getElementById('emptyState').classList.toggle('hidden', hasHabits);
  document.getElementById('summaryBar').style.display = hasHabits ? 'flex' : 'none';

  if (!hasHabits) return;

  // Calculate today column highlight position
  let todayHighlightStyle = '';
  if (todayColIndex >= 0) {
    // label-w + (todayColIndex * col-w) for the highlight
  }

  state.habits.forEach((habit, hi) => {
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.setAttribute('role', 'row');
    row.setAttribute('aria-label', habit.name);

    // Today column highlight overlay
    if (todayColIndex >= 0) {
      const highlight = document.createElement('div');
      highlight.className = 'today-col-highlight';
      highlight.style.cssText = `left: calc(var(--label-w) + ${todayColIndex} * var(--col-w)); width: var(--col-w);`;
      row.appendChild(highlight);
    }

    // Label cell
    const labelCell = document.createElement('div');
    labelCell.className = 'habit-label-cell';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'habit-name';
    nameSpan.textContent = habit.name;
    nameSpan.title = 'Click to rename';
    nameSpan.setAttribute('role', 'button');
    nameSpan.setAttribute('tabindex', '0');
    nameSpan.setAttribute('aria-label', `Rename habit: ${habit.name}`);
    nameSpan.addEventListener('click', () => startRename(hi, nameSpan));
    nameSpan.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startRename(hi, nameSpan); }
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    delBtn.setAttribute('aria-label', `Delete habit: ${habit.name}`);
    delBtn.addEventListener('click', () => deleteHabit(hi));

    labelCell.appendChild(nameSpan);
    labelCell.appendChild(delBtn);
    row.appendChild(labelCell);

    // Check cells
    const checks = state.checks[habit.id] || {};

    days.forEach((d) => {
      const ds = toDateStr(d);
      const checked = !!checks[ds];
      const future = isFuture(ds);

      const cell = document.createElement('div');
      cell.className = 'check-cell';
      cell.setAttribute('role', 'gridcell');

      const btn = document.createElement('button');
      btn.className = 'check-btn' + (checked ? ' checked' : '') + (future ? ' disabled' : '');
      btn.setAttribute('aria-label', `${habit.name} on ${ds}: ${checked ? 'completed' : 'not completed'}`);
      btn.setAttribute('aria-pressed', checked);
      btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

      if (!future) {
        btn.addEventListener('click', () => toggleCheck(habit.id, ds, btn));
      }

      cell.appendChild(btn);
      row.appendChild(cell);
    });

    // Streak cell
    const streak = getStreak(habit.id);
    const streakCell = document.createElement('div');
    streakCell.className = 'streak-cell';
    streakCell.setAttribute('role', 'gridcell');
    streakCell.setAttribute('aria-label', `Streak: ${streak} day${streak !== 1 ? 's' : ''}`);

    const badge = document.createElement('div');
    badge.className = 'streak-badge' +
      (streak >= 7 ? ' hot' : streak >= 1 ? ' active' : '');

    const icon = streak >= 7 ? '🔥' : streak >= 1 ? '▲' : '—';
    badge.innerHTML = `<span class="streak-icon" aria-hidden="true">${icon}</span>${streak > 0 ? streak + 'd' : '0'}`;
    streakCell.appendChild(badge);
    row.appendChild(streakCell);

    grid.appendChild(row);
  });

  renderSummary(days, td);
}

function renderSummary(days, td) {
  const bar = document.getElementById('summaryBar');
  if (!state.habits.length) { bar.innerHTML = ''; return; }

  // Today's completions
  const todayChecks = state.habits.filter(h => (state.checks[h.id] || {})[td]).length;
  const totalHabits = state.habits.length;

  // Week completions
  let weekTotal = 0, weekPossible = 0;
  days.forEach(d => {
    const ds = toDateStr(d);
    if (!isFuture(ds)) {
      weekPossible += totalHabits;
      state.habits.forEach(h => { if ((state.checks[h.id] || {})[ds]) weekTotal++; });
    }
  });

  const pct = weekPossible > 0 ? Math.round((weekTotal / weekPossible) * 100) : 0;

  const maxStreak = Math.max(...state.habits.map(h => getStreak(h.id)), 0);

  bar.innerHTML = `
    <div class="summary-item">
      <div class="summary-val ${todayChecks === totalHabits && totalHabits > 0 ? 'green' : ''}">${todayChecks}/${totalHabits}</div>
      <div class="summary-label">Today</div>
    </div>
    <div class="summary-item">
      <div class="summary-val ${pct >= 80 ? 'green' : pct >= 50 ? 'accent' : ''}">${pct}%</div>
      <div class="summary-label">Week rate</div>
    </div>
    <div class="summary-item">
      <div class="summary-val ${maxStreak >= 7 ? 'accent' : ''}">${maxStreak}d</div>
      <div class="summary-label">Best streak</div>
    </div>
  `;
}

function addHabit(name) {
  name = name.trim();
  if (!name) return false;
  if (state.habits.some(h => h.name.toLowerCase() === name.toLowerCase())) return false;

  const id = 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  state.habits.push({ id, name });
  saveData();
  render();
  return true;
}

function deleteHabit(index) {
  const [removed] = state.habits.splice(index, 1);
  delete state.checks[removed.id];
  saveData();
  render();
}

function toggleCheck(habitId, dateStr, btn) {
  if (!state.checks[habitId]) state.checks[habitId] = {};
  const wasChecked = !!state.checks[habitId][dateStr];
  state.checks[habitId][dateStr] = !wasChecked;
  saveData();

  // Optimistic UI update + pop animation
  btn.classList.toggle('checked', !wasChecked);
  btn.setAttribute('aria-pressed', !wasChecked);
  btn.classList.remove('pop');
  void btn.offsetWidth; // reflow
  btn.classList.add('pop');
  btn.addEventListener('animationend', () => btn.classList.remove('pop'), { once: true });

  // Re-render streak + summary without full repaint
  render();
}

function startRename(index, nameSpan) {
  const habit = state.habits[index];
  const input = document.createElement('input');
  input.className = 'habit-name-input';
  input.value = habit.name;
  input.maxLength = 60;
  input.setAttribute('aria-label', 'Rename habit');
  nameSpan.replaceWith(input);
  input.focus();
  input.select();

  function commit() {
    const newName = input.value.trim();
    if (newName && newName !== habit.name) {
      habit.name = newName;
      saveData();
    }
    render();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = habit.name; input.blur(); }
  });
}

document.getElementById('addHabitBtn').addEventListener('click', () => {
  const input = document.getElementById('habitInput');
  if (!addHabit(input.value)) {
    input.classList.add('shake');
    input.addEventListener('animationend', () => input.classList.remove('shake'), { once: true });
    input.focus();
    return;
  }
  input.value = '';
  input.focus();
});

document.getElementById('habitInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addHabitBtn').click();
});

document.getElementById('prevWeekBtn').addEventListener('click', () => {
  currentWeekOffset--;
  render();
});

document.getElementById('nextWeekBtn').addEventListener('click', () => {
  // only allow 1 week into the future
  if (currentWeekOffset < 1) { currentWeekOffset++; render(); }
});

document.getElementById('todayBtn').addEventListener('click', () => {
  currentWeekOffset = 0;
  render();
});

document.getElementById('emptyCtaBtn').addEventListener('click', () => {
  document.getElementById('habitInput').focus();
});

render();

// re-render at midnight so "today" updates without a reload
const now = new Date();
const msUntilMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
setTimeout(() => { render(); setInterval(render, 86400000); }, msUntilMidnight);
</script>
</body>
